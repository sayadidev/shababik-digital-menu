<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>غير متصل - شبابيك</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #F3EDE4;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      gap: 24px;
    }
    .logo {
      width: 120px;
      height: auto;
      opacity: 0.9;
    }
    .message {
      text-align: center;
      max-width: 320px;
    }
    .message .title {
      font-size: 20px;
      font-weight: 700;
      color: #3B2818;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .message .subtitle {
      font-size: 14px;
      color: #8C6B4A;
      line-height: 1.6;
    }
    .retry-btn {
      min-width: 160px;
      min-height: 48px;
      padding: 12px 32px;
      background-color: #5A4A3A;
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .retry-btn:active {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <img class="logo" src="/shababik-solid-logo.png" alt="Shababik" />

  <div class="message">
    <p class="title">يبدو أنك غير متصل بالإنترنت.</p>
    <p class="subtitle">يرجى التحقق من اتصال الواي فاي للعودة إلى قائمة شبابيك.</p>
  </div>

  <button class="retry-btn" type="button" onclick="window.location.reload()">
    إعادة المحاولة
  </button>
</body>
</html>
